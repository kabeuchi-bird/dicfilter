name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "対象のリリースタグ（例: v1.0.0）。このタグのリリースにビルド成果物を添付します。"
        required: true

permissions:
  contents: write

jobs:
  build-release:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: dicfilter
            asset: dicfilter-linux-x86_64.zip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: dicfilter.exe
            asset: dicfilter-windows-x86_64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: dicfilter
            asset: dicfilter-macos-aarch64.zip
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bin: dicfilter
            asset: dicfilter-macos-x86_64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          zip -j ${{ matrix.asset }} target/${{ matrix.target }}/release/${{ matrix.bin }} filter.txt

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/${{ matrix.bin }}, filter.txt -DestinationPath ${{ matrix.asset }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.asset }}
